<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Traffic Map</title>

    <!-- OFFLINE LEAFLET -->
    <link rel="stylesheet" href="./leaflet/leaflet.css">
    <script src="./leaflet/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            background: #0b0e14;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>
    /* ===============================
       1️⃣ INIT MAP
    ================================ */
    const map = L.map("map", {
        minZoom: 2,
        maxZoom: 18,
        worldCopyJump: true
    }).setView([20, 0], 2);

    /* ===============================
       2️⃣ REAL SATELLITE MAP
    ================================ */
    L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
            attribution: "© Esri"
        }
    ).addTo(map);
    L.tileLayer(
        "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
        {
            attribution: "© Esri Labels",
            pane: "overlayPane"
        }
    ).addTo(map);

    /* ===============================
       3️⃣ MARKER CACHE
    ================================ */
    const markerCache = {};

    /* ===============================
       4️⃣ ADD MARKER
    ================================ */
    function addMarker(lat, lon, country, ip) {
        if (markerCache[country]) return;

        const marker = L.circleMarker([lat, lon], {
            radius: 7,
            color: "#ef4444",
            fillColor: "#ef4444",
            fillOpacity: 0.9
        }).addTo(map);

        marker.bindPopup(
            `<b>Country:</b> ${country}<br>
         <b>IP:</b> ${ip}`
        );

        markerCache[country] = marker;
    }

    /* ===============================
       5️⃣ FETCH REAL PACKETS
    ================================ */
    async function fetchPackets() {
        try {
            const res = await fetch("http://localhost:8080/api/packet");
            const data = await res.json();

            data.forEach(pkt => {
                if (pkt.lat && pkt.lon && pkt.country) {
                    addMarker(
                        parseFloat(pkt.lat),
                        parseFloat(pkt.lon),
                        pkt.country,
                        pkt.src || "Unknown"
                    );
                }
            });

        } catch (err) {
            console.error("Packet API error:", err);
        }
    }

    /* ===============================
       6️⃣ AUTO REFRESH
    ================================ */
    setInterval(fetchPackets, 2000);
</script>

</body>
</html>
